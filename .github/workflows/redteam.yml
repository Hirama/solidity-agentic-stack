name: Red Team Agent

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"

jobs:
  redteam:
    name: Security Audit
    # Cascade guard: skip PRs already labeled by the fix agent.
    # Without this, every fix PR would trigger another audit → cascade.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'auto-fix') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      # workflow:write needed to dispatch fix.yml via gh workflow run
      # GITHUB_TOKEN does not get this scope — add GH_PAT secret (repo + workflow scope)
      # for the auto-dispatch to work. Without it, fix.py must be triggered manually.
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run red team agent
        run: python scripts/redteam.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GH_PAT (repo + workflow scope) enables auto-dispatch of fix.yml.
          # Falls back to GITHUB_TOKEN — issue creation works, dispatch may not.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
