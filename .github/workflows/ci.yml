name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Build (with sizes)
        run: forge build --sizes

      - name: Run tests
        run: forge test
        env:
          FOUNDRY_PROFILE: ci

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Generate coverage report
        run: forge coverage --report lcov

      - name: Enforce minimum 90% line coverage
        run: |
          LINES_FOUND=0
          LINES_HIT=0
          while IFS= read -r line; do
            [[ $line =~ ^LF:([0-9]+)$ ]] && LINES_FOUND=$((LINES_FOUND + ${BASH_REMATCH[1]}))
            [[ $line =~ ^LH:([0-9]+)$ ]] && LINES_HIT=$((LINES_HIT + ${BASH_REMATCH[1]}))
          done < lcov.info
          echo "Lines found: $LINES_FOUND, lines hit: $LINES_HIT"
          if [ "$LINES_FOUND" -eq 0 ]; then echo "No coverage data found"; exit 1; fi
          PCT=$((LINES_HIT * 100 / LINES_FOUND))
          echo "Coverage: ${PCT}% (${LINES_HIT}/${LINES_FOUND})"
          if [ "$PCT" -lt 90 ]; then echo "Coverage ${PCT}% is below the 90% threshold"; exit 1; fi
          echo "Coverage OK"

      - name: Upload lcov
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info

  slither:
    name: Slither
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: medium
          slither-config: slither.config.json

  aderyn:
    name: Aderyn
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Aderyn
        run: |
          curl -L "https://github.com/Cyfrin/aderyn/releases/latest/download/aderyn-x86_64-unknown-linux-musl.tar.gz" \
            | tar xzf - -C /tmp
          sudo mv /tmp/aderyn /usr/local/bin/aderyn
          aderyn --version

      - name: Run Aderyn
        run: aderyn .

      - name: Upload Aderyn report
        uses: actions/upload-artifact@v4
        with:
          name: aderyn-report
          path: report.md
